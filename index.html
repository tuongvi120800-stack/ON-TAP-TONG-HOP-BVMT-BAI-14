<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>环保主题语法练习 — HSK 4–5（70题）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;}
.page{max-width:780px;margin:0 auto;padding:2rem 1.25rem 4rem;}
header{margin-bottom:2rem;border-bottom:1px solid #e0dfd6;padding-bottom:1.25rem;}
header h1{font-size:22px;font-weight:600;margin-bottom:.4rem;color:#1a1a18;}
header p{font-size:14px;color:#888780;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px;}
.score-box{display:flex;gap:10px;}
.metric{background:#fff;border:1px solid #e0dfd6;border-radius:8px;padding:8px 18px;text-align:center;}
.metric .val{font-size:22px;font-weight:600;color:#1a1a18;}
.metric .lbl{font-size:11px;color:#888780;margin-top:2px;}
.reset-btn{font-size:13px;padding:7px 16px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;color:#555;}
.reset-btn:hover{background:#f0efea;}
.prog-bar{height:5px;background:#e0dfd6;border-radius:3px;margin-bottom:1.5rem;overflow:hidden;}
.prog-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .3s;}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.5rem;}
.ftag{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid #ccc;background:#fff;color:#666;cursor:pointer;transition:all .15s;}
.ftag:hover{border-color:#aaa;}
.ftag.active{background:#e6f1fb;color:#185fa5;border-color:#85b7eb;}
.section-label{font-size:12px;font-weight:600;color:#888780;letter-spacing:.05em;text-transform:uppercase;margin:1.5rem 0 .75rem;padding-bottom:.4rem;border-bottom:1px solid #e0dfd6;}
.q-card{background:#fff;border:1px solid #e0dfd6;border-radius:12px;padding:1.1rem 1.35rem;margin-bottom:.75rem;transition:border-color .2s;}
.q-card.correct{border-color:#1D9E75;background:#f4fbf8;}
.q-card.wrong{border-color:#E24B4A;background:#fef6f6;}
.q-meta{display:flex;gap:8px;margin-bottom:.6rem;align-items:center;flex-wrap:wrap;}
.q-num{font-size:12px;color:#aaa;min-width:22px;}
.q-tag{font-size:11px;padding:2px 9px;border-radius:20px;background:#f0efea;color:#666;}
.q-tag-multi{font-size:11px;padding:2px 9px;border-radius:20px;background:#faeeda;color:#854f0b;}
.q-tag-logic{font-size:11px;padding:2px 9px;border-radius:20px;background:#eaf3de;color:#3b6d11;}
.q-text{font-size:15px;line-height:1.9;margin-bottom:.8rem;color:#1a1a18;}
.hint{font-size:12px;color:#aaa;margin-bottom:.6rem;font-style:italic;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
@media(max-width:500px){.opts{grid-template-columns:1fr;}}
.opt{font-size:13.5px;padding:8px 13px;border-radius:8px;border:1px solid #e0dfd6;background:#f9f9f6;color:#1a1a18;cursor:pointer;text-align:left;transition:all .15s;line-height:1.5;}
.opt:hover:not(:disabled){border-color:#aaa;background:#f0efea;}
.opt.selected{border-color:#378add;background:#e6f1fb;color:#185fa5;}
.opt.right{border-color:#1D9E75;background:#e1f5ee;color:#085041;}
.opt.wrong-pick{border-color:#E24B4A;background:#fcebeb;color:#791f1f;}
.opt.missed{border-color:#EF9F27;background:#faeeda;color:#633806;}
.opt:disabled{cursor:default;}
.submit-btn{margin-top:.7rem;font-size:13px;padding:6px 18px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#555;}
.submit-btn:hover{background:#f0efea;}
.explain{margin-top:.7rem;font-size:13px;color:#666;line-height:1.75;display:none;padding:.6rem .85rem;background:#f5f5f0;border-radius:8px;border-left:3px solid #1D9E75;}
.explain.show{display:block;}
.ctrl-row{display:flex;gap:10px;margin-top:2rem;flex-wrap:wrap;}
.ctrl-btn{font-size:13px;padding:8px 20px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;color:#555;}
.ctrl-btn:hover{background:#f0efea;}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#888;margin-top:1.5rem;padding:1rem;background:#fff;border-radius:8px;border:1px solid #e0dfd6;}
.legend-item{display:flex;align-items:center;gap:5px;}
.dot{width:10px;height:10px;border-radius:50%;}
footer{text-align:center;font-size:12px;color:#bbb;margin-top:3rem;padding-top:1rem;border-top:1px solid #e0dfd6;}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>环保主题语法练习 — HSK 4–5</h1>
    <p>70题 · 涵盖：够 · 以 · 以…为… · 以便/以免/以防 · 既然 · 逻辑知识 · 多选题</p>
  </header>

  <div class="top-bar">
    <div class="score-box">
      <div class="metric"><div class="val" id="v-done">0</div><div class="lbl">已完成</div></div>
      <div class="metric"><div class="val" id="v-correct">0</div><div class="lbl">答对</div></div>
      <div class="metric"><div class="val" id="v-pct">0%</div><div class="lbl">正确率</div></div>
    </div>
    <button class="reset-btn" onclick="resetAll()">重新开始</button>
  </div>

  <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>

  <div class="filter-row">
    <button class="ftag active" onclick="filterBy('all',this)">全部 (70)</button>
    <button class="ftag" onclick="filterBy('够',this)">够 (10)</button>
    <button class="ftag" onclick="filterBy('以',this)">以 (10)</button>
    <button class="ftag" onclick="filterBy('以为',this)">以…为… (10)</button>
    <button class="ftag" onclick="filterBy('以目的',this)">以便/以免/以防 (10)</button>
    <button class="ftag" onclick="filterBy('既然',this)">既然 (10)</button>
    <button class="ftag" onclick="filterBy('logic',this)">逻辑+知识 (10)</button>
    <button class="ftag" onclick="filterBy('multi',this)">多选题 (10)</button>
  </div>

  <div id="qlist"></div>

  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#1D9E75"></div> 答对</div>
    <div class="legend-item"><div class="dot" style="background:#E24B4A"></div> 答错</div>
    <div class="legend-item"><div class="dot" style="background:#EF9F27"></div> 漏选（多选题）</div>
  </div>

  <div class="ctrl-row">
    <button class="ctrl-btn" onclick="showAll()">显示所有答案</button>
  </div>

  <footer>HSK 4–5 · 环境保护主题 · 语法练习</footer>
</div>

<script>
const qs=[
{tag:'够',type:'single',text:'塑料袋对环境的危害_____大的了，很多国家已经开始禁止使用了。',opts:['A. 非常','B. 够','C. 十分','D. 相当'],ans:[1],exp:'"够+adj+的"表示程度已达相当高的标准，含感叹语气，口语中常见。'},
{tag:'够',type:'single',text:'这次环保活动准备的宣传材料_____，每个参与者都能拿到一份。',opts:['A. 很多','B. 够多的了','C. 够','D. 满足'],ans:[2],exp:'"够"作动词，表示数量上能满足需求，"够+宾语"是常见结构。'},
{tag:'够',type:'single',text:'现在城市里的空气污染_____严重的了，很多人出门都戴口罩。',opts:['A. 够','B. 很','C. 比较','D. 有点'],ans:[0],exp:'"够+adj+的"在肯定句中表示程度高，隐含无奈或感叹语气。'},
{tag:'够',type:'single',text:'我们回收的废纸_____造一千本新书，请大家继续支持垃圾分类。',opts:['A. 可以','B. 足以','C. 够','D. 能'],ans:[2],exp:'"够"作动词，"够+动词短语"表示数量足以完成某事。'},
{tag:'够',type:'single',text:'只要大家的环保意识_____强，地球的未来一定会更美好。',opts:['A. 够','B. 很','C. 非常','D. 特别'],ans:[0],exp:'"只要……够+adj"表示条件充足，达到足够的程度。'},
{tag:'够',type:'single',text:'这个工厂排放的污水_____脏的了，附近的河流已经变成黑色了。',opts:['A. 十分','B. 够','C. 太','D. 极'],ans:[1],exp:'"够+adj+的"表达强烈的感叹，含批评或惊叹的语气。'},
{tag:'够',type:'single',text:'政府为改善空气质量所做的努力_____多了，但还需要市民的配合。',opts:['A. 够','B. 很','C. 相当','D. 非常'],ans:[0],exp:'"够+adj+了"表示程度已到位，含"已经足够"的意思。'},
{tag:'够',type:'single',text:'冰箱里存放的蔬菜_____我们一家人吃三天，不需要每天都去超市。',opts:['A. 足以','B. 够','C. 可以','D. 能够'],ans:[1],exp:'"够"作动词，后接宾语和时间状语，表示数量满足需求。'},
{tag:'够',type:'single',text:'你一个人_____完成这份关于碳排放的研究报告吗？内容太多了。',opts:['A. 够不够','B. 能够','C. 够能','D. 很能'],ans:[1],exp:'"能够"表示有能力完成，是固定搭配。'},
{tag:'够',type:'single',text:'他在环保方面的知识_____丰富的了，讲起来头头是道。',opts:['A. 非常','B. 够','C. 十分','D. 相当'],ans:[1],exp:'"够+adj+的"含赞叹语气，表示程度相当高。'},
{tag:'以',type:'single',text:'这家工厂决定_____更先进的技术来减少废气排放。',opts:['A. 用了','B. 以','C. 靠','D. 凭借了'],ans:[1],exp:'"以+名词"作状语，表示凭借，书面语，相当于"用"。'},
{tag:'以',type:'single',text:'她每天骑自行车上班，_____减少碳排放，为环保出一份力。',opts:['A. 以','B. 为了','C. 所以','D. 来'],ans:[0],exp:'"以"作连词表目的，书面语，相当于"用来/为的是"，主语必须一致。'},
{tag:'以',type:'single',text:'政府发布通知，要求各企业_____最严格的标准来控制污水排放。',opts:['A. 按','B. 以','C. 用着','D. 靠'],ans:[1],exp:'"以……来+动词"表示凭借某方式，是常见书面表达。'},
{tag:'以',type:'single',text:'他把自己亲眼目睹的环境破坏_____照片的方式记录下来。',opts:['A. 以','B. 用','C. 靠','D. 凭'],ans:[0],exp:'"以……的方式"是固定书面结构，表示通过某种方式。'},
{tag:'以',type:'single',text:'请大家把垃圾分类后再扔进垃圾桶，_____回收利用更方便。',opts:['A. 以防','B. 以免','C. 以便','D. 以'],ans:[2],exp:'"以便"引导正面目的，"回收利用更方便"是期望实现的结果。'},
{tag:'以',type:'single',text:'出门时记得关掉空调，_____浪费不必要的电力。',opts:['A. 以便','B. 以防','C. 以','D. 以免'],ans:[3],exp:'"以免"后接负面结果，"浪费电力"是不希望发生的事。'},
{tag:'以',type:'single',text:'城市应该多种树、多建公园，_____改善市区的空气质量。',opts:['A. 以','B. 因为','C. 所以','D. 但是'],ans:[0],exp:'"以"作连词表目的，用于后一分句句首，主语相同。'},
{tag:'以',type:'single',text:'请随身携带环保袋，_____购物时不需要使用塑料袋。',opts:['A. 以便','B. 以免','C. 以防','D. 以'],ans:[0],exp:'"以便"引导正面目的，购物时不用塑料袋是期望实现的结果。'},
{tag:'以',type:'single',text:'他_____亲身经历告诉同学们，乱扔垃圾会带来怎样的后果。',opts:['A. 以','B. 用了','C. 靠','D. 通过了'],ans:[0],exp:'"以+名词"作状语，"以亲身经历"是书面常用结构。'},
{tag:'以',type:'single',text:'政府_____颁布新法律来加强对环境污染行为的处罚力度。',opts:['A. 以','B. 用','C. 靠','D. 凭'],ans:[0],exp:'"以……来……"表示凭借某手段实现目的，书面语。'},
{tag:'以为',type:'single',text:'这家企业一直_____绿色生产为核心理念，深受消费者欢迎。',opts:['A. 把……作为','B. 以……为','C. 用……做','D. 拿……当'],ans:[1],exp:'"以……为……"是书面语固定结构，表示"把……作为……"。'},
{tag:'以为',type:'single',text:'我们应该_____节约资源为荣，_____浪费为耻。',opts:['A. 以……以','B. 把……把','C. 以……为','D. 用……用'],ans:[2],exp:'"以……为荣/为耻"是固定搭配，表示以某事为荣耀或耻辱。'},
{tag:'以为',type:'single',text:'这次环保课程_____实践活动为主，理论讲解为辅。',opts:['A. 以……为','B. 把……当','C. 用','D. 让'],ans:[0],exp:'"以……为主，……为辅"是固定结构，表示主次关系。'},
{tag:'以为',type:'single',text:'制定环保政策时，政府应该_____人民的健康为最高优先级。',opts:['A. 把','B. 拿','C. 以……为','D. 让'],ans:[2],exp:'"以……为最高优先级"表示把某事作为最重要的考量标准。'},
{tag:'以为',type:'single',text:'这位科学家_____研究气候变化为毕生事业，贡献了几十年的心血。',opts:['A. 把……当','B. 以……为','C. 用……做','D. 拿……作'],ans:[1],exp:'"以……为……"表示把某事作为某物，书面语。'},
{tag:'以为',type:'single',text:'本次环保展览_____青少年为主要目标群体，希望从小培养环保意识。',opts:['A. 以……为','B. 把……当作','C. 拿……作','D. 用……做'],ans:[0],exp:'"以……为主要目标群体"定位受众，是书面常见结构。'},
{tag:'以为',type:'single',text:'这篇文章_____塑料污染为主题，提出了多项减少塑料使用的建议。',opts:['A. 把','B. 用','C. 以……为','D. 让……成'],ans:[2],exp:'"以……为主题"固定搭配，以某内容作为核心话题。'},
{tag:'以为',type:'single',text:'环保组织_____"地球只有一个"为口号，呼吁大家共同保护环境。',opts:['A. 以……为','B. 把……当','C. 用……作','D. 让……是'],ans:[0],exp:'"以……为口号"固定搭配，把某句话作为宣传口号。'},
{tag:'以为',type:'single',text:'该公司_____减少碳排放为发展目标，每年都会公布环保报告。',opts:['A. 把','B. 以……为','C. 拿','D. 让'],ans:[1],exp:'"以……为发展目标"，把某事设定为努力方向，书面语。'},
{tag:'以为',type:'single',text:'这次垃圾分类比赛_____参与人数为准，不以分类是否完美为标准。',opts:['A. 以……为','B. 把……当','C. 拿……做','D. 用……算'],ans:[0],exp:'"以……为准"固定搭配，表示以某项作为判断依据。'},
{tag:'以目的',type:'single',text:'请大家把废旧电池放入专用回收箱，_____对土壤造成污染。',opts:['A. 以便','B. 以防','C. 以免','D. 以'],ans:[2],exp:'"以免"后接负面结果，"对土壤造成污染"是不希望发生的事。'},
{tag:'以目的',type:'single',text:'超市已经将塑料袋改为可降解袋，_____减少白色污染。',opts:['A. 以防','B. 以便','C. 以免','D. 以'],ans:[1],exp:'"以便减少"，减少污染是期望目标，引导正面结果用"以便"。'},
{tag:'以目的',type:'single',text:'出门时随手带一个环保袋，_____临时需要购物时避免使用塑料袋。',opts:['A. 以便','B. 以免','C. 以防','D. 以'],ans:[2],exp:'"以防"表示预防，提前准备以应对可能的情况。'},
{tag:'以目的',type:'single',text:'工厂在排放废水前必须进行处理，_____直接污染河流。',opts:['A. 以便','B. 以防','C. 以免','D. 以'],ans:[2],exp:'"以免"后接负面结果，"直接污染河流"是要避免的情况。'},
{tag:'以目的',type:'single',text:'政府在海边设置了专门的垃圾桶，_____游客方便丢垃圾。',opts:['A. 以防','B. 以免','C. 以便','D. 以'],ans:[2],exp:'"以便"引导正面目的，"方便丢垃圾"是期望实现的效果。'},
{tag:'以目的',type:'single',text:'学校组织学生参观垃圾处理厂，_____同学们了解垃圾分类的全过程。',opts:['A. 以免','B. 以便','C. 以防','D. 以'],ans:[1],exp:'"以便了解"，了解全过程是正面目的，用"以便"。'},
{tag:'以目的',type:'single',text:'请在森林里不要随意生火，_____引发火灾破坏生态环境。',opts:['A. 以便','B. 以防','C. 以免','D. 以'],ans:[2],exp:'"以免引发"，火灾是负面结果，用"以免"。'},
{tag:'以目的',type:'single',text:'环保部门建议市民多种植绿色植物，_____净化室内空气。',opts:['A. 以防','B. 以免','C. 以便','D. 以'],ans:[2],exp:'"以便净化"，净化空气是正面目的，用"以便"。'},
{tag:'以目的',type:'single',text:'出行时请记住关好车窗，_____尾气直接进入车内影响健康。',opts:['A. 以便','B. 以防','C. 以免','D. 以'],ans:[2],exp:'"以免"后接不希望发生的结果，用"以免"。'},
{tag:'以目的',type:'single',text:'请多备一个垃圾袋在包里，_____外出时找不到垃圾桶时使用。',opts:['A. 以便','B. 以免','C. 以防','D. 以'],ans:[2],exp:'"以防……时"，预防外出时找不到垃圾桶的情况，用"以防"。'},
{tag:'既然',type:'single',text:'_____你已经了解了塑料污染的严重性，就应该从今天开始减少使用塑料袋。',opts:['A. 虽然','B. 既然','C. 如果','D. 因为'],ans:[1],exp:'"既然"用于已知事实，后接推论行动，常与"就"搭配。'},
{tag:'既然',type:'single',text:'_____大家都同意在社区推行垃圾分类，我们就尽快制定具体方案吧。',opts:['A. 因为','B. 既然','C. 尽管','D. 只要'],ans:[1],exp:'"既然……就"，前提已成事实，后推出合理结论。'},
{tag:'既然',type:'single',text:'_____这家工厂多次违规排污，政府_____应该对其采取更严厉的处罚措施。',opts:['A. 既然……就','B. 虽然……但','C. 因为……所以','D. 如果……就'],ans:[0],exp:'"既然……就"，前提：多次违规；结论：应严厉处罚。'},
{tag:'既然',type:'single',text:'A：今天的户外环保活动因为下雨取消了。B：_____这样，那我们改到室内进行宣传吧。',opts:['A. 既然','B. 虽然','C. 即使','D. 不管'],ans:[0],exp:'"既然这样"接受现实情况，顺势推出解决方案。'},
{tag:'既然',type:'single',text:'_____你选择了乘坐公共交通出行，_____坚持下去，这对减少尾气排放很有帮助。',opts:['A. 既然……就','B. 虽然……也','C. 只要……就','D. 如果……会'],ans:[0],exp:'"既然……就"，已做出决定为前提，鼓励坚持为结论。'},
{tag:'既然',type:'single',text:'_____环境污染已经影响到了我们的日常生活，我们每个人都有责任去改变现状。',opts:['A. 尽管','B. 既然','C. 虽然','D. 只要'],ans:[1],exp:'"既然"承认现实，推出每个人应负责的结论。'},

let answered={},multiSel={},correct=0,filter='all';

function filterBy(tag,el){
  filter=tag;
  document.querySelectorAll('.ftag').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  const list=document.getElementById('qlist');
  list.innerHTML='';
  const visible=qs.filter(q=>filter==='all'||q.tag===filter);
  visible.forEach((q,vi)=>{
    const gi=qs.indexOf(q);
    const isMulti=q.type==='multi';
    const done=answered[gi]!==undefined;
    let cardClass='q-card';
    if(done){
      if(isMulti){
        const sel=multiSel[gi]||[];
        const cs=q.ans.slice().sort().join(',');
        const ss=sel.slice().sort().join(',');
        cardClass+= ss===cs?' correct':' wrong';
      } else {
        cardClass+=answered[gi]===q.ans[0]?' correct':' wrong';
      }
    }
    let tagHtml='';
    if(isMulti) tagHtml='<span class="q-tag-multi">多选题</span>';
    else if(q.tag==='logic') tagHtml='<span class="q-tag-logic">逻辑+知识</span>';
    else tagHtml=`<span class="q-tag">${q.tag}</span>`;
    const hintHtml=isMulti?'<div class="hint">可选多个答案，选完后点"提交答案"</div>':'';
    const optHtml=q.opts.map((o,oi)=>{
      let cls='opt';
      if(done){
        const isC=q.ans.includes(oi);
        if(isMulti){
          const sel=multiSel[gi]||[];
          if(isC&&sel.includes(oi))cls+=' right';
          else if(isC&&!sel.includes(oi))cls+=' missed';
          else if(!isC&&sel.includes(oi))cls+=' wrong-pick';
        } else {
          if(isC)cls+=' right';
          else if(answered[gi]===oi)cls+=' wrong-pick';
        }
      } else if(isMulti&&(multiSel[gi]||[]).includes(oi)){
        cls+=' selected';
      }
      const fn=isMulti?`toggleMulti(${gi},${oi})`:`pickSingle(${gi},${oi})`;
      return `<button class="${cls}" onclick="${fn}" ${done?'disabled':''}>${o}</button>`;
    }).join('');
    const submitHtml=isMulti&&!done?'<button class="submit-btn" onclick="submitMulti('+gi+')">提交答案</button>':'';
    const div=document.createElement('div');
    div.className=cardClass;
    div.id='qc'+gi;
    div.innerHTML=`<div class="q-meta"><span class="q-num">${vi+1}</span>${tagHtml}</div><div class="q-text">${q.text}</div>${hintHtml}<div class="opts">${optHtml}</div>${submitHtml}<div class="explain ${done?'show':''}">${q.exp}</div>`;
    list.appendChild(div);
  });
  updateStats();
}

function pickSingle(gi,oi){
  if(answered[gi]!==undefined)return;
  answered[gi]=oi;
  if(oi===qs[gi].ans[0])correct++;
  render();
  setTimeout(()=>{const el=document.getElementById('qc'+gi);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
}

function toggleMulti(gi,oi){
  if(answered[gi]!==undefined)return;
  if(!multiSel[gi])multiSel[gi]=[];
  const idx=multiSel[gi].indexOf(oi);
  if(idx===-1)multiSel[gi].push(oi);
  else multiSel[gi].splice(idx,1);
  render();
}

function submitMulti(gi){
  if(answered[gi]!==undefined)return;
  const sel=(multiSel[gi]||[]).slice().sort().join(',');
  const cs=qs[gi].ans.slice().sort().join(',');
  answered[gi]=sel;
  if(sel===cs)correct++;
  render();
}

function updateStats(){
  const done=Object.keys(answered).length;
  document.getElementById('v-done').textContent=done;
  document.getElementById('v-correct').textContent=correct;
  document.getElementById('v-pct').textContent=done>0?Math.round(correct/done*100)+'%':'0%';
  document.getElementById('prog').style.width=Math.round(done/qs.length*100)+'%';
}

function showAll(){
  qs.forEach((q,gi)=>{
    if(answered[gi]===undefined){
      if(q.type==='multi'){multiSel[gi]=q.ans;answered[gi]=q.ans.slice().sort().join(',');}
      else answered[gi]=q.ans[0];
    }
  });
  render();
}

function resetAll(){answered={};multiSel={};correct=0;render();}
render();
</script>
